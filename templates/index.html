<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit Predictor | ADN Acústico</title>
    <style>
        :root {
            --bg-color: #050505;
            --container-bg: #111115;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --navy-blue: #002244;
            --navy-light: #004080;
            --accent: #0066cc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #001f3f 0%, transparent 50%);
        }

        .container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 34, 68, 0.3);
            border: 1px solid #222;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .header h1 span {
            color: var(--accent);
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(0, 102, 204, 0.3);
        }

        button {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--navy-blue), var(--navy-light));
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: linear-gradient(135deg, var(--navy-light), var(--accent));
            transform: translateY(-2px);
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background-color: rgba(0, 34, 68, 0.2);
            border-left: 4px solid var(--accent);
            border-radius: 4px;
            display: none; /* Se muestra con JS */
        }

        .result-box h3 {
            margin-bottom: 10px;
            color: #fff;
        }

        .prob-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Hit <span>Predictor</span></h1>
        <p>Laboratorio de Análisis de ADN Acústico</p>
    </div>

    <form id="predictor-form" class="form-grid">
        <div class="form-group full-width">
            <label>Nombre de la Pista</label>
            <input type="text" id="nombre" required placeholder="Ej. Midnight City">
        </div>
        
        <div class="form-group full-width">
            <label>Género Musical</label>
            <input type="text" id="genero" required placeholder="Ej. pop, rock, electronic">
        </div>

        <div class="form-group">
            <label>Tempo (BPM)</label>
            <input type="number" id="tempo" step="0.1" required placeholder="120.0">
        </div>

        <div class="form-group">
            <label>Danceability (0-1)</label>
            <input type="number" id="danceability" step="0.01" min="0" max="1" required placeholder="0.75">
        </div>

        <div class="form-group">
            <label>Energía (0-1)</label>
            <input type="number" id="energy" step="0.01" min="0" max="1" required placeholder="0.80">
        </div>

        <div class="form-group">
            <label>Valence (0-1)</label>
            <input type="number" id="valence" step="0.01" min="0" max="1" required placeholder="0.60">
        </div>

        <div class="form-group">
            <label>Loudness (dB)</label>
            <input type="number" id="loudness" step="0.1" required placeholder="-4.5">
        </div>

        <div class="form-group">
            <label>Acousticness (0-1)</label>
            <input type="number" id="acousticness" step="0.01" min="0" max="1" required placeholder="0.15">
        </div>

        <button type="submit">Predecir Éxito</button>
    </form>

    <div class="result-box" id="result-box">
        <h3>Resultados del Análisis</h3>
        <p id="genero-detectado"></p>
        <div class="prob-text" id="probabilidad"></div>
        <p id="veredicto"></p>
    </div>
</div>

<script>
    document.getElementById('predictor-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const data = {
            nombre: document.getElementById('nombre').value,
            genero: document.getElementById('genero').value,
            tempo: parseFloat(document.getElementById('tempo').value),
            danceability: parseFloat(document.getElementById('danceability').value),
            energy: parseFloat(document.getElementById('energy').value),
            valence: parseFloat(document.getElementById('valence').value),
            loudness: parseFloat(document.getElementById('loudness').value),
            acousticness: parseFloat(document.getElementById('acousticness').value)
        };

        const response = await fetch('/predecir', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        
        const resultBox = document.getElementById('result-box');
        resultBox.style.display = 'block';
        
        document.getElementById('genero-detectado').innerText = `Género: ${result.genero.toUpperCase()}`;
        document.getElementById('probabilidad').innerText = `Probabilidad: ${result.probabilidad}%`;
        document.getElementById('veredicto').innerText = `Veredicto: ${result.veredicto}`;
    });
</script>

</body>
</html>
